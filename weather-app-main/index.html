<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Weather App</h1>
            <p class="subtitle">Know your weather anywhere</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..." 
                    autocomplete="off"
                />
                <button id="searchBtn">Search</button>
            </div>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <div id="weatherResult" class="weather-result hidden">
            <div class="weather-card">
                <div class="weather-header">
                    <h2 id="cityName"></h2>
                    <p id="weatherDescription"></p>
                </div>

                <div class="weather-icon-section">
                    <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
                </div>

                <div class="temperature-section">
                    <div class="temperature">
                        <span id="temperature"></span>
                        <span class="celsius">°C</span>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-row">
                        <span class="detail-label">Feels Like:</span>
                        <span id="feelsLike" class="detail-value"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Humidity:</span>
                        <span id="humidity" class="detail-value"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Wind Speed:</span>
                        <span id="windSpeed" class="detail-value"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Pressure:</span>
                        <span id="pressure" class="detail-value"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
